{% extends "base.html" %}
{% block title %}{{ _('Admin Sign In · Keydion') }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 text-center mb-3">{{ _('Admin Login') }}</h1>
                <p class="text-muted text-center mb-4">
                    {{ _('Sign in with your administrator username and password.') }}
                </p>
                <form method="post" class="mt-3">
                    <div class="mb-3">
                        <label for="username" class="form-label">{{ _('Username') }}</label>
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="{{ _('e.g. admin') }}" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">{{ _('Password') }}</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-outline-primary w-100">{{ _('Sign in') }}</button>
                </form>
                <div class="text-center mt-3 small">
                    <a href="{{ url_for('login') }}" class="text-muted">{{ _('← Back to regular login') }}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
