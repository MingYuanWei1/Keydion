{% extends "base.html" %}
{% block title %}{{ _('Create Account · Keydion') }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 text-center mb-3">{{ _('Create your account') }}</h1>
                <p class="text-muted text-center mb-4">
                    {{ _('Fill in the details below to register a new Keydion account.') }}
                </p>
                <form method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">{{ _('Email') }} <span
                                class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ email }}"
                            placeholder="{{ _('e.g. user@example.com') }}" required autofocus>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">{{ _('First name') }} <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="first_name" name="first_name"
                                value="{{ first_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">{{ _('Last name') }} <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="last_name" name="last_name"
                                value="{{ last_name }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">{{ _('Password') }} <span
                                class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">{{ _('Confirm password') }} <span
                                class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{{ _('Create account') }}</button>
                </form>
                <div class="text-center mt-3 small">
                    <span class="text-muted">{{ _('Already have an account?') }}</span>
                    <a href="{{ url_for('login') }}">{{ _('Sign in') }}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
