{% extends "base.html" %}
{% block title %}{{ _('Upload Paper · PaperQuery') }}{% endblock %}
{% block content %}
<div class="page-title">
  <h1>{{ _('Upload a New Paper') }}</h1>
  <p class="text-muted">{{ _('Share PDF files with the school community. Files are instantly available for search.') }}</p>
</div>

<div class="mb-3">
  <a class="btn btn-outline-secondary back-link" href="{{ url_for('dashboard') }}">
    &larr; {{ _('Back to Dashboard') }}
  </a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data" class="upload-form">
      <div class="mb-3">
        <label for="paper" class="form-label">{{ _('Select PDF file') }}</label>
        <input class="form-control" type="file" id="paper" name="paper" accept="application/pdf" required>
      </div>
      <button type="submit" class="btn btn-primary">{{ _('Upload') }}</button>
    </form>
  </div>
</div>
{% endblock %}
