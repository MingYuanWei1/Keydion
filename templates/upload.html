{% extends "base.html" %}
{% block title %}{{ _('Paper Submission · Keydion') }}{% endblock %}
{% block content %}
<div class="page-title">
  <h1>{{ _('Paper Submission Portal') }}</h1>
  <p class="text-muted">{{ _('Please fill in the information below and upload your research') }}</p>
</div>

<div class="mb-3">
  <a class="btn btn-outline-secondary back-link" href="{{ url_for('dashboard') }}">
    &larr; {{ _('Back to Dashboard') }}
  </a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data" class="upload-form">
      <!-- Paper Title -->
      <div class="mb-3">
        <label for="title" class="form-label">{{ _('Paper Title') }}</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ form_data.title }}"
          placeholder="{{ _('Please enter the complete paper title') }}" required>
      </div>

      <!-- Journal (optional) & Keywords -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="journal" class="form-label">{{ _('Journal') }} <small class="text-muted">({{ _('optional')
              }})</small></label>
          <select class="form-select" id="journal" name="journal">
            <option value="" {% if not form_data.journal %}selected{% endif %}>{{ _('No journal (leave blank)') }}
            </option>
            {% for j in journals %}
            <option value="{{ j }}" {% if form_data.journal==j %}selected{% endif %}>{{ j }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label for="keywords" class="form-label">{{ _('Keywords') }}</label>
          <input type="text" class="form-control" id="keywords" name="keywords" value="{{ form_data.keywords }}"
            placeholder="{{ _('Enter keywords, separated by commas') }}" required>
        </div>
      </div>

      <!-- Subject Category & Language -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="category" class="form-label">{{ _('Subject Category') }}</label>
          <select class="form-select" id="category" name="category" required>
            <option value="" disabled {% if not form_data.category %}selected{% endif %}>{{ _('Please select a
              category...') }}</option>
            {% for cat in paper_categories %}
            <option value="{{ cat }}" {% if form_data.category==cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label for="language" class="form-label">{{ _('Language') }}</label>
          <select class="form-select" id="language" name="language" required>
            <option value="" disabled {% if not form_data.language %}selected{% endif %}>{{ _('Please select a
              language...') }}</option>
            <option value="zh" {% if form_data.language=='zh' %}selected{% endif %}>{{ _('Chinese') }}</option>
            <option value="en" {% if form_data.language=='en' %}selected{% endif %}>{{ _('English') }}</option>
          </select>
        </div>
      </div>

      <!-- Abstract -->
      <div class="mb-3">
        <label for="abstract" class="form-label">{{ _('Abstract') }} <small class="text-muted">({{ _('300 characters
            max') }})</small></label>
        <textarea class="form-control" id="abstract" name="abstract" rows="5"
          placeholder="{{ _('Please briefly describe your research background, methods, and conclusions...') }}"
          required>{{ form_data.abstract }}</textarea>
      </div>

      <!-- First Author Information -->
      <div class="mb-3">
        <label class="form-label">{{ _('First Author Information') }}</label>
        <div class="row g-3">
          <div class="col-md-4">
            <input type="text" class="form-control" id="author_name" name="author_name"
              value="{{ form_data.author_name }}" placeholder="{{ _('Name') }}" required>
          </div>
          <div class="col-md-4">
            <input type="email" class="form-control" id="author_email" name="author_email"
              value="{{ form_data.author_email }}" placeholder="{{ _('Email') }}" required>
          </div>
          <div class="col-md-4">
            <input type="text" class="form-control" id="author_school" name="author_school"
              value="{{ form_data.author_school }}" placeholder="{{ _('School') }}" required>
          </div>
        </div>
      </div>

      <!-- File Upload -->
      <div class="mb-4">
        <label for="paper" class="form-label">{{ _('File Upload') }} <small class="text-muted">(PDF, {{ _('max 20MB')
            }})</small></label>
        <input class="form-control" type="file" id="paper" name="paper" accept=".pdf,application/pdf" required>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ _('Submit Paper') }}</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">{{ _('Cancel') }}</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
